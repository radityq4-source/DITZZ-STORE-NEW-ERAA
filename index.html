.link-btn:hover{

.link-btn img{

.link-btn:nth-child(4){animation-delay:0.5s;}
.link-btn:nth-child(5){animation-delay:0.7s;}
.link-btn:nth-child(6){animation-delay:0.9s;}
.link-btn:nth-child(7){animation-delay:1.1s;}
.link-btn:nth-child(8){animation-delay:1.3s;}

@keyframes fadeUp{
from{transform:translateY(30px);opacity:0;}
to{transform:translateY(0);opacity:1;}
